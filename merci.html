<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message envoyé — Palmares Graphic</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #001a3a;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .container { max-width: 560px; }
    .icon {
      width: 80px; height: 80px;
      background: #F49519;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 32px;
      font-size: 36px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    p {
      color: rgba(255,255,255,0.65);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    a {
      background: #F49519;
      color: #004B98;
      padding: 14px 40px;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-block;
    }
    a:hover { background: #fff; }
    .brand {
      margin-top: 48px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✓</div>
    <h1>Message envoyé !</h1>
    <p>Merci pour votre message. L'équipe Palmares Graphic vous répondra dans les plus brefs délais.</p>
    <a href="index.html">← Retour au site</a>
    <div class="brand">Palmares Graphic — Niamey, Niger</div>
  </div>
</body>
</html>
